name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: gosec Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          # The action checks out the repo itself (via actions/checkout@v6). We already
          # checked out above with v7, and the two leave duplicate auth extraheaders in
          # git config -> "remote: Duplicate header: Authorization" -> HTTP 400. Skip the
          # action's redundant checkout and reuse ours.
          repo-checkout: false
          output-format: sarif
          output-file: govulncheck-results.sarif
